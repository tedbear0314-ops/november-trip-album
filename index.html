<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>宇平區、世嘉區2026區旅遊相簿</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <style>
    :root {
      color-scheme: light;
    }

    body {
      min-height: 100vh;
      background: #f4f7f2;
      color: #17201a;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", Arial, sans-serif;
    }

    button,
    label {
      -webkit-tap-highlight-color: transparent;
    }

    .active-tab {
      background: #ffffff;
      color: #166534;
      box-shadow: 0 10px 24px rgba(22, 101, 52, 0.12);
    }

    .media-tile {
      position: relative;
      aspect-ratio: 1 / 1;
      overflow: hidden;
      border-radius: 8px;
      background: #e5e7eb;
    }

    .media-tile img,
    .media-tile video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .thumbnail-state-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 10px;
      background: rgba(6, 78, 59, 0.84);
      color: #fff;
      text-align: center;
      z-index: 3;
    }

    .thumbnail-state-overlay.error {
      background: rgba(153, 27, 27, 0.86);
    }

    .thumbnail-state-overlay i {
      font-size: 26px;
    }

    .thumbnail-state-title {
      font-size: 15px;
      font-weight: 900;
      line-height: 1.15;
    }

    .thumbnail-state-subtitle {
      font-size: 11px;
      font-weight: 900;
      line-height: 1.2;
      opacity: 0.9;
    }

    .thumbnail-spinner {
      width: 24px;
      height: 24px;
      border-radius: 999px;
      border: 3px solid rgba(255, 255, 255, 0.42);
      border-top-color: #fff;
      animation: thumbnailSpin 0.85s linear infinite;
    }

    @keyframes thumbnailSpin {
      to {
        transform: rotate(360deg);
      }
    }

    .delete-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 34px;
      height: 34px;
      border-radius: 999px;
      background: rgba(185, 28, 28, 0.94);
      color: #fff;
      display: grid;
      place-items: center;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.24);
      z-index: 2;
    }

    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 80;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(6, 10, 8, 0.94);
    }

    #lightbox img,
    #lightbox video {
      max-width: 100%;
      max-height: 88vh;
      border-radius: 8px;
      object-fit: contain;
      background: #000;
    }

    .close-lightbox-btn {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 48px;
      height: 48px;
      border-radius: 999px;
      background: #fff;
      color: #111827;
      display: grid;
      place-items: center;
      font-size: 24px;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.35);
      z-index: 90;
    }

    .download-lightbox-btn {
      position: absolute;
      top: 16px;
      right: 76px;
      width: 48px;
      height: 48px;
      border-radius: 999px;
      background: #fff;
      color: #111827;
      display: grid;
      place-items: center;
      font-size: 20px;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.35);
      z-index: 90;
    }

    .upload-status-icon.is-loading i {
      animation: uploadPulse 1.1s ease-in-out infinite;
    }

    @keyframes uploadPulse {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-4px);
      }
    }
  </style>
</head>
<body>
  <main class="mx-auto flex min-h-screen w-full max-w-3xl flex-col px-4 py-4 sm:px-6">
    <header class="sticky top-0 z-40 -mx-4 border-b border-emerald-900/10 bg-[#f4f7f2]/95 px-4 py-3 backdrop-blur sm:-mx-6 sm:px-6">
      <div class="flex items-center justify-between gap-3">
        <h1 class="text-xl font-black tracking-normal text-emerald-950 sm:text-2xl">宇平區、世嘉區2026區旅遊相簿</h1>
        <button id="refreshBtn" type="button" class="hidden h-11 w-11 place-items-center rounded-full bg-white text-emerald-800 shadow-sm ring-1 ring-emerald-900/10" onclick="fetchAlbum()" title="重新整理">
          <i class="fa-solid fa-rotate-right"></i>
        </button>
      </div>

      <nav class="mt-3 grid grid-cols-2 gap-2 rounded-lg bg-emerald-950/10 p-1">
        <button onclick="switchPage('upload')" id="tab-upload" class="active-tab h-12 rounded-md text-base font-black transition">
          <i class="fa-solid fa-cloud-arrow-up mr-2"></i>上傳
        </button>
        <button onclick="switchPage('album')" id="tab-album" class="h-12 rounded-md text-base font-black text-emerald-950/65 transition">
          <i class="fa-solid fa-images mr-2"></i>相簿
        </button>
      </nav>
    </header>

    <section id="page-upload" class="flex-1 py-5">
      <div class="rounded-lg bg-white p-5 shadow-sm ring-1 ring-emerald-900/10 sm:p-7">
        <div class="mb-5 flex items-start justify-between gap-4">
          <div>
            <h2 class="text-2xl font-black text-emerald-950">新增照片與影片</h2>
            <p class="mt-1 text-sm font-semibold text-slate-500">照片與影片都會上傳到 Google Drive。</p>
          </div>
          <div id="configBadge" class="rounded-full bg-amber-100 px-3 py-1 text-xs font-black text-amber-800">待設定</div>
        </div>

        <label for="fileInput" class="flex min-h-40 cursor-pointer flex-col items-center justify-center rounded-lg border-2 border-dashed border-emerald-700/30 bg-emerald-50 px-5 py-8 text-center text-emerald-900 transition active:scale-[0.99]">
          <i class="fa-solid fa-images mb-3 text-4xl"></i>
          <span class="text-xl font-black">選擇照片或影片</span>
          <span class="mt-2 text-sm font-semibold text-emerald-900/60">JPG、PNG、HEIC、MP4、MOV；單檔 200 MB 以內</span>
        </label>
        <input type="file" id="fileInput" multiple accept="image/*,video/*" class="hidden" onchange="previewFiles()">

        <div id="previewGrid" class="mt-5 grid grid-cols-3 gap-3 sm:grid-cols-4"></div>

        <button id="startUploadBtn" onclick="processUpload()" class="mt-6 hidden h-14 w-full rounded-lg bg-emerald-700 text-lg font-black text-white shadow-sm transition active:scale-[0.99] disabled:cursor-not-allowed disabled:bg-slate-300">
          <i class="fa-solid fa-cloud-arrow-up mr-2"></i>開始上傳 <span id="fileCount">0</span> 個檔案
        </button>

        <div id="uploadProgressPanel" class="mt-5 hidden rounded-lg border-2 border-emerald-700 bg-emerald-50 p-4 shadow-lg shadow-emerald-900/10">
          <div class="mb-4 flex items-center gap-3">
            <div id="uploadProgressIcon" class="upload-status-icon is-loading grid h-14 w-14 shrink-0 place-items-center rounded-full bg-emerald-700 text-2xl text-white shadow-sm">
              <i id="uploadProgressIconSymbol" class="fa-solid fa-cloud-arrow-up"></i>
            </div>
            <div class="min-w-0 flex-1">
              <div id="uploadProgressTitle" class="text-xl font-black text-emerald-950">正在上傳</div>
              <div id="currentProgressText" class="mt-1 min-h-6 break-words text-sm font-black text-emerald-800">準備上傳</div>
            </div>
          </div>

          <div class="mb-3 flex items-center justify-between gap-3 text-base font-black text-slate-700">
            <span>全部進度</span>
            <span id="overallProgressText" class="text-emerald-800">0%</span>
          </div>
          <div class="h-5 overflow-hidden rounded-full bg-white ring-1 ring-emerald-900/10">
            <div id="overallProgressBar" class="h-full w-0 rounded-full bg-emerald-700 transition-[width] duration-200"></div>
          </div>

          <div class="mt-5 mb-3 flex items-center justify-between gap-3 text-base font-black text-slate-700">
            <span>目前檔案</span>
            <span id="currentProgressPercent" class="text-emerald-800">0%</span>
          </div>
          <div class="h-5 overflow-hidden rounded-full bg-white ring-1 ring-emerald-900/10">
            <div id="currentProgressBar" class="h-full w-0 rounded-full bg-emerald-500 transition-[width] duration-200"></div>
          </div>
        </div>

        <div id="uploadStatus" class="mt-5 min-h-8 text-center text-base font-black"></div>
      </div>
    </section>

    <section id="page-album" class="hidden flex-1 py-5">
      <div class="mb-4 flex items-center justify-between gap-3">
        <h2 class="text-2xl font-black text-emerald-950">相簿</h2>
        <div id="albumCount" class="text-sm font-black text-slate-500"></div>
      </div>
      <div id="albumGrid" class="grid grid-cols-2 gap-3 sm:grid-cols-3">
        <div class="col-span-full rounded-lg bg-white py-24 text-center text-lg font-black text-slate-400 ring-1 ring-emerald-900/10">
          <i class="fa-solid fa-spinner fa-spin mr-2 text-emerald-700"></i>讀取中
        </div>
      </div>
      <button id="loadMoreBtn" type="button" onclick="loadMoreAlbum()" class="mx-auto mt-5 hidden h-12 rounded-lg bg-emerald-700 px-6 text-base font-black text-white shadow-sm transition active:scale-[0.99]">
        <i class="fa-solid fa-plus mr-2"></i>載入更多
      </button>
    </section>
  </main>

  <div id="lightbox" onclick="closeLightbox()">
    <a id="lightboxDownload" class="download-lightbox-btn" href="#" download title="下載" onclick="event.stopPropagation();">
      <i class="fa-solid fa-download"></i>
    </a>
    <button class="close-lightbox-btn" onclick="closeLightbox()" title="關閉">
      <i class="fa-solid fa-xmark"></i>
    </button>
    <img id="lightboxImg" alt="" onclick="event.stopPropagation();">
    <video id="lightboxVideo" controls playsinline onclick="event.stopPropagation();"></video>
  </div>

  <script>
    const DRIVE_CONFIG = {
      enabled: true,
      gasWebAppUrl: "https://script.google.com/macros/s/AKfycbwhTDrFxWSqw3mLIzSK34xBfU-rb997U2krPxFHcZ_Cs5-hijQ8DTJiJ6If_dqMcSq7/exec",
      maxBytes: 200 * 1024 * 1024
    };

    let filesToUpload = [];
    let currentPage = "upload";
    let albumAssets = [];
    let albumVisibleCount = 0;
    let isUploading = false;
    const ALBUM_PAGE_SIZE = 50;

    const els = {
      fileInput: document.getElementById("fileInput"),
      previewGrid: document.getElementById("previewGrid"),
      startUploadBtn: document.getElementById("startUploadBtn"),
      fileCount: document.getElementById("fileCount"),
      uploadStatus: document.getElementById("uploadStatus"),
      uploadProgressPanel: document.getElementById("uploadProgressPanel"),
      uploadProgressIcon: document.getElementById("uploadProgressIcon"),
      uploadProgressIconSymbol: document.getElementById("uploadProgressIconSymbol"),
      uploadProgressTitle: document.getElementById("uploadProgressTitle"),
      overallProgressBar: document.getElementById("overallProgressBar"),
      overallProgressText: document.getElementById("overallProgressText"),
      currentProgressBar: document.getElementById("currentProgressBar"),
      currentProgressPercent: document.getElementById("currentProgressPercent"),
      currentProgressText: document.getElementById("currentProgressText"),
      albumGrid: document.getElementById("albumGrid"),
      albumCount: document.getElementById("albumCount"),
      loadMoreBtn: document.getElementById("loadMoreBtn"),
      refreshBtn: document.getElementById("refreshBtn"),
      configBadge: document.getElementById("configBadge"),
      lightbox: document.getElementById("lightbox"),
      lightboxDownload: document.getElementById("lightboxDownload"),
      lightboxImg: document.getElementById("lightboxImg"),
      lightboxVideo: document.getElementById("lightboxVideo")
    };

    function updateConfigBadge() {
      if (hasDriveConfig()) {
        els.configBadge.textContent = "全部 Google Drive";
        els.configBadge.className = "rounded-full bg-emerald-100 px-3 py-1 text-xs font-black text-emerald-800";
        return;
      }

      els.configBadge.textContent = "待設定";
      els.configBadge.className = "rounded-full bg-amber-100 px-3 py-1 text-xs font-black text-amber-800";
    }

    function hasDriveConfig() {
      return Boolean(
        DRIVE_CONFIG.enabled &&
        DRIVE_CONFIG.gasWebAppUrl &&
        !DRIVE_CONFIG.gasWebAppUrl.startsWith("請填入")
      );
    }

    function switchPage(page) {
      currentPage = page;
      document.getElementById("page-upload").classList.toggle("hidden", page !== "upload");
      document.getElementById("page-album").classList.toggle("hidden", page !== "album");
      document.getElementById("tab-upload").className = page === "upload"
        ? "active-tab h-12 rounded-md text-base font-black transition"
        : "h-12 rounded-md text-base font-black text-emerald-950/65 transition";
      document.getElementById("tab-album").className = page === "album"
        ? "active-tab h-12 rounded-md text-base font-black transition"
        : "h-12 rounded-md text-base font-black text-emerald-950/65 transition";
      els.refreshBtn.classList.toggle("hidden", page !== "album");
      els.refreshBtn.classList.toggle("grid", page === "album");

      if (page === "album") {
        fetchAlbum();
      }
    }

    function previewFiles() {
      const selectedFiles = Array.from(els.fileInput.files || []);
      let skippedOversizeCount = 0;

      if (!isUploading && filesToUpload.some(item => item.uploadState && item.uploadState !== "pending")) {
        filesToUpload.forEach(item => URL.revokeObjectURL(item.previewUrl));
        filesToUpload = [];
      }

      selectedFiles.forEach(file => {
        const kind = getFileKind(file);

        if (file.size > DRIVE_CONFIG.maxBytes) {
          skippedOversizeCount += 1;
          return;
        }

        filesToUpload.push({
          id: crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random()}`,
          file,
          previewUrl: URL.createObjectURL(file),
          kind,
          uploadState: "pending",
          uploadMessage: "等待上傳到 Google Drive"
        });
      });

      els.fileInput.value = "";
      renderPreview();

      if (skippedOversizeCount > 0) {
        setStatus(`已略過 ${skippedOversizeCount} 個超過 200 MB 的檔案，請用 AirDrop 傳原始檔。`, "warning");
      }
    }

    function renderPreview() {
      els.previewGrid.innerHTML = "";

      filesToUpload.forEach((item, index) => {
        const tile = document.createElement("div");
        tile.className = "media-tile ring-1 ring-slate-200";

        const mediaIcon = item.kind === "video" ? "fa-video" : "fa-image";
        const media = item.kind === "video"
          ? `<video src="${item.previewUrl}" muted playsinline></video><span class="absolute bottom-2 left-2 rounded bg-black/65 px-2 py-1 text-xs font-black text-white"><i class="fa-solid ${mediaIcon} mr-1"></i>Google Drive</span>`
          : `<img src="${item.previewUrl}" alt=""><span class="absolute bottom-2 left-2 rounded bg-black/65 px-2 py-1 text-xs font-black text-white"><i class="fa-solid ${mediaIcon} mr-1"></i>Google Drive</span>`;
        const stateStyle = getUploadStateStyle(item.uploadState);
        const overlay = renderThumbnailStateOverlay(item);

        tile.innerHTML = `
          ${media}
          <div class="absolute inset-x-2 top-2 rounded bg-white/92 px-2 py-1 text-center text-[11px] font-black text-slate-700 shadow-sm ${stateStyle} ${item.uploadState === "uploading" || item.uploadState === "error" ? "hidden" : ""}">
            ${item.uploadMessage || "等待上傳"}
          </div>
          ${overlay}
          ${isUploading ? "" : `
            <button type="button" class="delete-btn" onclick="removeFile(${index})" title="移除">
              <i class="fa-solid fa-xmark"></i>
            </button>
          `}
        `;
        els.previewGrid.appendChild(tile);
      });

      els.fileCount.textContent = filesToUpload.length;
      els.startUploadBtn.classList.toggle("hidden", filesToUpload.length === 0);

      if (!isUploading) {
        els.uploadStatus.textContent = "";
      }
    }

    function removeFile(index) {
      if (isUploading) {
        return;
      }

      URL.revokeObjectURL(filesToUpload[index].previewUrl);
      filesToUpload.splice(index, 1);
      renderPreview();
    }

    function getUploadStateStyle(state) {
      const styles = {
        uploading: "text-emerald-800",
        done: "text-emerald-700",
        error: "text-red-700",
        skipped: "text-amber-700"
      };

      return styles[state] || "text-slate-700";
    }

    function renderThumbnailStateOverlay(item) {
      if (item.uploadState !== "uploading" && item.uploadState !== "error") {
        return "";
      }

      const isError = item.uploadState === "error";
      const destination = "Google Drive";
      const icon = isError ? "fa-solid fa-circle-xmark" : "fa-solid fa-cloud-arrow-up";
      const title = isError ? "上傳失敗" : "上傳中";
      const subtitle = isError ? (item.uploadMessage || "請稍後重試") : destination;

      return `
        <div class="thumbnail-state-overlay ${isError ? "error" : ""}">
          <i class="${icon}"></i>
          <div class="thumbnail-state-title">${title}</div>
          <div class="thumbnail-state-subtitle">${subtitle}</div>
          ${isError ? "" : '<div class="thumbnail-spinner"></div>'}
        </div>
      `;
    }

    function updateFileUploadState(id, state, message) {
      const item = filesToUpload.find(fileItem => fileItem.id === id);

      if (!item) {
        return;
      }

      item.uploadState = state;
      item.uploadMessage = message;
      renderPreview();
    }

    function setUploadProgress({ overallPercent = 0, currentPercent = 0, message = "", type = "loading" }) {
      const overall = clampPercent(overallPercent);
      const current = clampPercent(currentPercent);

      els.uploadProgressPanel.classList.remove("hidden");
      els.overallProgressBar.style.width = `${overall}%`;
      els.overallProgressText.textContent = `${Math.round(overall)}%`;
      els.currentProgressBar.style.width = `${current}%`;
      els.currentProgressPercent.textContent = `${Math.round(current)}%`;
      els.currentProgressText.textContent = message;

      const panelStyles = {
        loading: "mt-5 rounded-lg border-2 border-emerald-700 bg-emerald-50 p-4 shadow-lg shadow-emerald-900/10",
        success: "mt-5 rounded-lg border-2 border-emerald-700 bg-emerald-50 p-4 shadow-lg shadow-emerald-900/10",
        warning: "mt-5 rounded-lg border-2 border-amber-500 bg-amber-50 p-4 shadow-lg shadow-amber-900/10",
        error: "mt-5 rounded-lg border-2 border-red-600 bg-red-50 p-4 shadow-lg shadow-red-900/10"
      };
      const iconStyles = {
        loading: "upload-status-icon is-loading grid h-14 w-14 shrink-0 place-items-center rounded-full bg-emerald-700 text-2xl text-white shadow-sm",
        success: "upload-status-icon grid h-14 w-14 shrink-0 place-items-center rounded-full bg-emerald-700 text-2xl text-white shadow-sm",
        warning: "upload-status-icon grid h-14 w-14 shrink-0 place-items-center rounded-full bg-amber-500 text-2xl text-white shadow-sm",
        error: "upload-status-icon grid h-14 w-14 shrink-0 place-items-center rounded-full bg-red-600 text-2xl text-white shadow-sm"
      };
      const iconSymbols = {
        loading: "fa-solid fa-cloud-arrow-up",
        success: "fa-solid fa-circle-check",
        warning: "fa-solid fa-triangle-exclamation",
        error: "fa-solid fa-circle-xmark"
      };
      const titles = {
        loading: "正在上傳",
        success: "上傳完成",
        warning: "需要處理",
        error: "上傳失敗"
      };
      const currentStyles = {
        loading: "h-full rounded-full bg-emerald-500 transition-[width] duration-200",
        success: "h-full rounded-full bg-emerald-700 transition-[width] duration-200",
        warning: "h-full rounded-full bg-amber-500 transition-[width] duration-200",
        error: "h-full rounded-full bg-red-600 transition-[width] duration-200"
      };
      const safeType = currentStyles[type] ? type : "loading";

      els.uploadProgressPanel.className = panelStyles[safeType];
      els.uploadProgressIcon.className = iconStyles[safeType];
      els.uploadProgressIconSymbol.className = iconSymbols[safeType];
      els.uploadProgressTitle.textContent = titles[safeType];
      els.currentProgressBar.className = currentStyles[type] || currentStyles.loading;
    }

    function resetUploadProgress() {
      setUploadProgress({
        overallPercent: 0,
        currentPercent: 0,
        message: "準備上傳",
        type: "loading"
      });
    }

    function clampPercent(value) {
      return Math.max(0, Math.min(100, Number(value) || 0));
    }

    async function processUpload() {
      const hasImages = filesToUpload.some(item => item.kind === "image");
      const hasVideos = filesToUpload.some(item => item.kind === "video");

      if ((hasImages || hasVideos) && !hasDriveConfig()) {
        setStatus("請先設定 GAS 後端網址。", "warning");
        return;
      }

      isUploading = true;
      els.startUploadBtn.disabled = true;
      resetUploadProgress();

      let photoSentCount = 0;
      let videoSentCount = 0;
      let failedCount = 0;
      const totalFiles = filesToUpload.length;

      if (!totalFiles) {
        isUploading = false;
        els.startUploadBtn.disabled = false;
        return;
      }

      for (let i = 0; i < filesToUpload.length; i += 1) {
        const item = filesToUpload[i];
        const overallBase = (i / totalFiles) * 100;
        const overallScale = 100 / totalFiles;
        setStatus(`上傳中 ${i + 1} / ${totalFiles}`, "loading");

        if (item.file.size > DRIVE_CONFIG.maxBytes) {
          updateFileUploadState(item.id, "skipped", "超過 200 MB");
          setUploadProgress({
            overallPercent: overallBase + overallScale,
            currentPercent: 100,
            message: `${item.file.name} 超過 200 MB，請用 AirDrop 傳原始檔。`,
            type: "warning"
          });
          setStatus(`${item.file.name} 超過 200 MB，請用 AirDrop 傳原始檔。`, "warning");
          await wait(900);
          continue;
        }

        try {
          updateFileUploadState(item.id, "uploading", "上傳中");

          setStatus(`上傳到 Google Drive ${i + 1} / ${filesToUpload.length}`, "loading");
          await uploadToGasDriveWithProgress(item.file, percent => {
            const typeLabel = item.kind === "video" ? "影片" : "照片";
            const stageMessage = percent < 40
              ? `讀取${typeLabel}：${item.file.name} ${Math.round((percent / 40) * 100)}%`
              : `上傳${typeLabel}到 Google Drive 中，請不要關閉頁面：${item.file.name}`;
            setUploadProgress({
              overallPercent: overallBase + overallScale * (percent / 100),
              currentPercent: percent,
              message: stageMessage,
              type: "loading"
            });
          });
          updateFileUploadState(item.id, "done", "Google Drive 完成");

          if (item.kind === "image") {
            photoSentCount += 1;
          } else {
            videoSentCount += 1;
          }

          setUploadProgress({
            overallPercent: overallBase + overallScale,
            currentPercent: 100,
            message: `${item.file.name} 上傳完成`,
            type: "success"
          });
        } catch (error) {
          console.error(error);
          failedCount += 1;
          updateFileUploadState(item.id, "error", "上傳失敗");
          setUploadProgress({
            overallPercent: overallBase + overallScale,
            currentPercent: 100,
            message: `上傳失敗：${item.file.name}（${error.message || "未知錯誤"}）`,
            type: "error"
          });
          setStatus(`上傳失敗：${item.file.name}（${error.message || "未知錯誤"}）`, "error");
          await wait(900);
        }
      }

      isUploading = false;
      els.startUploadBtn.disabled = false;
      filesToUpload.forEach(item => URL.revokeObjectURL(item.previewUrl));
      filesToUpload = [];
      renderPreview();
      els.startUploadBtn.classList.add("hidden");

      setStatus(
        `完成：照片 ${photoSentCount} 張、影片 ${videoSentCount} 支${failedCount ? `，失敗 ${failedCount} 個` : ""}。`,
        photoSentCount || videoSentCount ? "success" : "error"
      );

      if (currentPage === "album") {
        fetchAlbum();
      }
    }

    async function uploadToGasDriveWithProgress(file, onProgress) {
      let videoThumbnail = null;

      if (getFileKind(file) === "video") {
        onProgress(2);
        videoThumbnail = await generateVideoThumbnail(file).catch(error => {
          console.warn("Video thumbnail generation failed", error);
          return null;
        });
        onProgress(5);
      }

      const dataUrl = await readFileAsDataUrlWithProgress(file, percent => {
        const readStart = videoThumbnail ? 5 : 0;
        const readScale = videoThumbnail ? 35 : 40;
        onProgress(readStart + percent * (readScale / 100));
      });
      const payload = {
        action: "upload",
        fileName: file.name,
        mimeType: file.type || inferMimeType(file.name),
        size: file.size,
        dataBase64: dataUrl.split(",")[1]
      };

      if (videoThumbnail) {
        payload.thumbnailMimeType = videoThumbnail.mimeType;
        payload.thumbnailBase64 = videoThumbnail.dataUrl.split(",")[1];
      }

      const stopIndeterminateProgress = startIndeterminateUploadProgress(onProgress);

      try {
        await sendGasPayload(payload);
        onProgress(100);
      } finally {
        stopIndeterminateProgress();
      }
    }

    async function sendGasPayload(payload) {
      await fetch(DRIVE_CONFIG.gasWebAppUrl, {
        method: "POST",
        mode: "no-cors",
        headers: {
          "Content-Type": "text/plain;charset=utf-8"
        },
        body: JSON.stringify(payload)
      });
    }

    function getFileKind(file) {
      const type = (file.type || "").toLowerCase();
      const name = (file.name || "").toLowerCase();

      if (type.startsWith("image/") || /\.(jpe?g|png|gif|webp|heic|heif)$/i.test(name)) {
        return "image";
      }

      if (type.startsWith("video/") || /\.(mp4|mov|m4v|avi|webm)$/i.test(name)) {
        return "video";
      }

      return "image";
    }

    function generateVideoThumbnail(file) {
      return new Promise((resolve, reject) => {
        const video = document.createElement("video");
        const objectUrl = URL.createObjectURL(file);
        const timeoutId = window.setTimeout(() => {
          cleanup();
          reject(new Error("Video thumbnail timeout"));
        }, 8000);

        function cleanup() {
          window.clearTimeout(timeoutId);
          video.pause();
          video.removeAttribute("src");
          URL.revokeObjectURL(objectUrl);
        }

        function capture() {
          try {
            const sourceWidth = video.videoWidth || 700;
            const sourceHeight = video.videoHeight || 700;
            const maxSide = 900;
            const scale = Math.min(1, maxSide / Math.max(sourceWidth, sourceHeight));
            const canvas = document.createElement("canvas");

            canvas.width = Math.max(1, Math.round(sourceWidth * scale));
            canvas.height = Math.max(1, Math.round(sourceHeight * scale));
            canvas.getContext("2d").drawImage(video, 0, 0, canvas.width, canvas.height);
            const dataUrl = canvas.toDataURL("image/jpeg", 0.78);
            cleanup();
            resolve({ dataUrl, mimeType: "image/jpeg" });
          } catch (error) {
            cleanup();
            reject(error);
          }
        }

        video.preload = "metadata";
        video.muted = true;
        video.playsInline = true;
        video.addEventListener("loadedmetadata", () => {
          const duration = Number.isFinite(video.duration) ? video.duration : 0;
          const captureTime = duration > 2 ? 1.5 : Math.max(0, duration * 0.5);

          if (captureTime > 0) {
            video.currentTime = captureTime;
          } else {
            capture();
          }
        }, { once: true });
        video.addEventListener("seeked", capture, { once: true });
        video.addEventListener("loadeddata", () => {
          if (!Number.isFinite(video.duration) || video.duration === 0) {
            capture();
          }
        }, { once: true });
        video.onerror = () => {
          cleanup();
          reject(new Error("Video cannot be loaded for thumbnail"));
        };
        video.src = objectUrl;
        video.load();
      });
    }

    function inferMimeType(fileName) {
      const name = String(fileName || "").toLowerCase();
      const mimeTypes = {
        jpg: "image/jpeg",
        jpeg: "image/jpeg",
        png: "image/png",
        gif: "image/gif",
        webp: "image/webp",
        heic: "image/heic",
        heif: "image/heif",
        mp4: "video/mp4",
        mov: "video/quicktime",
        m4v: "video/x-m4v",
        avi: "video/x-msvideo",
        webm: "video/webm"
      };
      const match = name.match(/\.([a-z0-9]+)$/);

      return match && mimeTypes[match[1]] ? mimeTypes[match[1]] : "application/octet-stream";
    }

    function readFileAsDataUrlWithProgress(file, onProgress) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onprogress = event => {
          if (event.lengthComputable) {
            onProgress((event.loaded / event.total) * 100);
          }
        };
        reader.onload = () => {
          onProgress(100);
          resolve(reader.result);
        };
        reader.onerror = () => reject(reader.error);
        reader.readAsDataURL(file);
      });
    }

    function startIndeterminateUploadProgress(onProgress) {
      let progress = 42;
      onProgress(progress);

      const timerId = window.setInterval(() => {
        progress = Math.min(95, progress + Math.max(0.4, (95 - progress) * 0.08));
        onProgress(progress);
      }, 700);

      return () => window.clearInterval(timerId);
    }

    async function fetchAlbum() {
      if (!hasDriveConfig()) {
        els.albumGrid.innerHTML = emptyState("請先設定 GAS 相簿清單網址。");
        els.albumCount.textContent = "";
        els.loadMoreBtn.classList.add("hidden");
        return;
      }

      els.albumGrid.innerHTML = loadingState();
      els.albumCount.textContent = "";
      els.loadMoreBtn.classList.add("hidden");

      try {
        const assets = await fetchDriveAlbumList();
        renderAlbum(assets, true);
      } catch (error) {
        console.error(error);
        els.albumGrid.innerHTML = emptyState("目前無法讀取 Google Drive 相簿，請確認 Apps Script 已重新部署。");
        els.loadMoreBtn.classList.add("hidden");
      }
    }

    function fetchDriveAlbumList() {
      return loadGasJsonp({ action: "list" }).then(result => {
        if (!result || result.ok === false) {
          throw new Error(result && result.error ? result.error : "Google Drive list failed");
        }

        return result.files || [];
      });
    }

    function loadGasJsonp(params) {
      return new Promise((resolve, reject) => {
        const callbackName = `gasCallback_${Date.now()}_${Math.random().toString(36).slice(2)}`;
        const url = new URL(DRIVE_CONFIG.gasWebAppUrl);
        Object.entries(params).forEach(([key, value]) => url.searchParams.set(key, value));
        url.searchParams.set("_ts", Date.now().toString());
        url.searchParams.set("callback", callbackName);

        const script = document.createElement("script");
        const timeoutId = window.setTimeout(() => {
          cleanup();
          reject(new Error("GAS list request timed out"));
        }, 30000);

        function cleanup() {
          window.clearTimeout(timeoutId);
          delete window[callbackName];
          script.remove();
        }

        window[callbackName] = data => {
          cleanup();
          resolve(data);
        };

        script.onerror = () => {
          cleanup();
          reject(new Error("GAS list request failed"));
        };

        script.src = url.toString();
        document.body.appendChild(script);
      });
    }

    function renderAlbum(assets, reset = false) {
      if (reset) {
        albumAssets = assets;
        albumVisibleCount = 0;
        els.albumGrid.innerHTML = "";
      }

      if (!assets.length) {
        els.albumGrid.innerHTML = emptyState("目前沒有照片或影片。");
        els.albumCount.textContent = "";
        els.loadMoreBtn.classList.add("hidden");
        return;
      }

      const nextVisibleCount = Math.min(albumVisibleCount + ALBUM_PAGE_SIZE, albumAssets.length);
      const nextAssets = albumAssets.slice(albumVisibleCount, nextVisibleCount);

      nextAssets.forEach(asset => {
        const tile = document.createElement("button");
        tile.type = "button";
        tile.className = "media-tile bg-white text-left shadow-sm ring-1 ring-emerald-900/10 transition active:scale-[0.99]";
        tile.onclick = () => openMedia(asset);
        tile.innerHTML = `
          <img src="${asset.thumbUrl || asset.thumbnailUrl || asset.secureUrl || placeholderDataUrl(asset.kind)}" loading="lazy" alt="" onerror="this.onerror=null; this.src='${placeholderDataUrl(asset.kind)}';">
          ${asset.kind === "video" ? '<span class="absolute bottom-2 left-2 rounded bg-black/65 px-2 py-1 text-xs font-black text-white"><i class="fa-solid fa-video mr-1"></i>影片</span>' : ""}
        `;

        els.albumGrid.appendChild(tile);
      });

      albumVisibleCount = nextVisibleCount;
      els.albumCount.textContent = `已顯示 ${albumVisibleCount} / ${albumAssets.length} 個 Google Drive 檔案`;
      els.loadMoreBtn.classList.toggle("hidden", albumVisibleCount >= albumAssets.length);
    }

    function loadMoreAlbum() {
      renderAlbum(albumAssets);
    }

    function openMedia(asset) {
      if (asset.kind === "video") {
        window.open(asset.viewUrl, "_blank", "noopener");
        return;
      }

      openLightbox(asset.viewUrl || asset.thumbUrl, asset.downloadUrl || asset.viewUrl);
    }

    function openLightbox(url, downloadUrl) {
      els.lightboxImg.style.display = "block";
      els.lightboxVideo.style.display = "none";
      els.lightboxDownload.href = downloadUrl || url;
      els.lightboxVideo.pause();
      els.lightboxVideo.removeAttribute("src");
      els.lightboxImg.src = url;

      els.lightbox.style.display = "flex";
      document.body.style.overflow = "hidden";
    }

    function placeholderDataUrl(kind) {
      const label = kind === "video" ? "影片" : "照片";
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="700" height="700" viewBox="0 0 700 700"><rect width="700" height="700" fill="#e8efe8"/><text x="350" y="350" text-anchor="middle" dominant-baseline="middle" fill="#166534" font-family="Arial,sans-serif" font-size="72" font-weight="700">${label}</text></svg>`;

      return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`;
    }

    function closeLightbox() {
      els.lightbox.style.display = "none";
      els.lightboxVideo.pause();
      els.lightboxVideo.removeAttribute("src");
      els.lightboxImg.removeAttribute("src");
      document.body.style.overflow = "auto";
    }

    function setStatus(message, type) {
      const styles = {
        loading: "mt-5 min-h-8 text-center text-base font-black text-emerald-700",
        success: "mt-5 min-h-8 text-center text-base font-black text-emerald-700",
        warning: "mt-5 min-h-8 text-center text-base font-black text-amber-700",
        error: "mt-5 min-h-8 text-center text-base font-black text-red-700"
      };

      els.uploadStatus.className = styles[type] || styles.loading;
      els.uploadStatus.textContent = message;
    }

    function loadingState() {
      return `
        <div class="col-span-full rounded-lg bg-white py-24 text-center text-lg font-black text-slate-400 ring-1 ring-emerald-900/10">
          <i class="fa-solid fa-spinner fa-spin mr-2 text-emerald-700"></i>讀取中
        </div>
      `;
    }

    function emptyState(message) {
      return `
        <div class="col-span-full rounded-lg bg-white py-24 text-center text-lg font-black text-slate-400 ring-1 ring-emerald-900/10">
          ${message}
        </div>
      `;
    }

    function wait(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    updateConfigBadge();
  </script>
</body>
</html>
