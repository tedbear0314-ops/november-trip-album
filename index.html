<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>宇平區、世嘉區2026區旅遊相簿</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <style>
    :root {
      color-scheme: light;
    }

    body {
      min-height: 100vh;
      background: #f4f7f2;
      color: #17201a;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", Arial, sans-serif;
    }

    button,
    label {
      -webkit-tap-highlight-color: transparent;
    }

    .active-tab {
      background: #ffffff;
      color: #166534;
      box-shadow: 0 10px 24px rgba(22, 101, 52, 0.12);
    }

    .media-tile {
      position: relative;
      aspect-ratio: 1 / 1;
      overflow: hidden;
      border-radius: 8px;
      background: #e5e7eb;
    }

    .media-tile img,
    .media-tile video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .delete-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 34px;
      height: 34px;
      border-radius: 999px;
      background: rgba(185, 28, 28, 0.94);
      color: #fff;
      display: grid;
      place-items: center;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.24);
      z-index: 2;
    }

    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 80;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(6, 10, 8, 0.94);
    }

    #lightbox img,
    #lightbox video {
      max-width: 100%;
      max-height: 88vh;
      border-radius: 8px;
      object-fit: contain;
      background: #000;
    }

    .close-lightbox-btn {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 48px;
      height: 48px;
      border-radius: 999px;
      background: #fff;
      color: #111827;
      display: grid;
      place-items: center;
      font-size: 24px;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.35);
      z-index: 90;
    }

    .download-lightbox-btn {
      position: absolute;
      top: 16px;
      right: 76px;
      width: 48px;
      height: 48px;
      border-radius: 999px;
      background: #fff;
      color: #111827;
      display: grid;
      place-items: center;
      font-size: 20px;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.35);
      z-index: 90;
    }
  </style>
</head>
<body>
  <main class="mx-auto flex min-h-screen w-full max-w-3xl flex-col px-4 py-4 sm:px-6">
    <header class="sticky top-0 z-40 -mx-4 border-b border-emerald-900/10 bg-[#f4f7f2]/95 px-4 py-3 backdrop-blur sm:-mx-6 sm:px-6">
      <div class="flex items-center justify-between gap-3">
        <h1 class="text-xl font-black tracking-normal text-emerald-950 sm:text-2xl">宇平區、世嘉區2026區旅遊相簿</h1>
        <button id="refreshBtn" type="button" class="hidden h-11 w-11 place-items-center rounded-full bg-white text-emerald-800 shadow-sm ring-1 ring-emerald-900/10" onclick="fetchAlbum()" title="重新整理">
          <i class="fa-solid fa-rotate-right"></i>
        </button>
      </div>

      <nav class="mt-3 grid grid-cols-2 gap-2 rounded-lg bg-emerald-950/10 p-1">
        <button onclick="switchPage('upload')" id="tab-upload" class="active-tab h-12 rounded-md text-base font-black transition">
          <i class="fa-solid fa-cloud-arrow-up mr-2"></i>上傳
        </button>
        <button onclick="switchPage('album')" id="tab-album" class="h-12 rounded-md text-base font-black text-emerald-950/65 transition">
          <i class="fa-solid fa-images mr-2"></i>相簿
        </button>
      </nav>
    </header>

    <section id="page-upload" class="flex-1 py-5">
      <div class="rounded-lg bg-white p-5 shadow-sm ring-1 ring-emerald-900/10 sm:p-7">
        <div class="mb-5 flex items-start justify-between gap-4">
          <div>
            <h2 class="text-2xl font-black text-emerald-950">新增照片與影片</h2>
            <p class="mt-1 text-sm font-semibold text-slate-500">照片與小影片會保留原檔並顯示在相簿；超過 200 MB 請用 AirDrop。</p>
          </div>
          <div id="configBadge" class="rounded-full bg-amber-100 px-3 py-1 text-xs font-black text-amber-800">待設定</div>
        </div>

        <label for="fileInput" class="flex min-h-40 cursor-pointer flex-col items-center justify-center rounded-lg border-2 border-dashed border-emerald-700/30 bg-emerald-50 px-5 py-8 text-center text-emerald-900 transition active:scale-[0.99]">
          <i class="fa-solid fa-images mb-3 text-4xl"></i>
          <span class="text-xl font-black">選擇照片或影片</span>
          <span class="mt-2 text-sm font-semibold text-emerald-900/60">JPG、PNG、HEIC、MP4、MOV；單檔 200 MB 以內</span>
        </label>
        <input type="file" id="fileInput" multiple accept="image/*,video/*" class="hidden" onchange="previewFiles()">

        <div id="previewGrid" class="mt-5 grid grid-cols-3 gap-3 sm:grid-cols-4"></div>

        <button id="startUploadBtn" onclick="processUpload()" class="mt-6 hidden h-14 w-full rounded-lg bg-emerald-700 text-lg font-black text-white shadow-sm transition active:scale-[0.99] disabled:cursor-not-allowed disabled:bg-slate-300">
          <i class="fa-solid fa-cloud-arrow-up mr-2"></i>開始上傳 <span id="fileCount">0</span> 個檔案
        </button>

        <div id="uploadStatus" class="mt-5 min-h-8 text-center text-base font-black"></div>
      </div>
    </section>

    <section id="page-album" class="hidden flex-1 py-5">
      <div class="mb-4 flex items-center justify-between gap-3">
        <h2 class="text-2xl font-black text-emerald-950">相簿</h2>
        <div id="albumCount" class="text-sm font-black text-slate-500"></div>
      </div>
      <div id="albumGrid" class="grid grid-cols-2 gap-3 sm:grid-cols-3">
        <div class="col-span-full rounded-lg bg-white py-24 text-center text-lg font-black text-slate-400 ring-1 ring-emerald-900/10">
          <i class="fa-solid fa-spinner fa-spin mr-2 text-emerald-700"></i>讀取中
        </div>
      </div>
      <button id="loadMoreBtn" type="button" onclick="loadMoreAlbum()" class="mx-auto mt-5 hidden h-12 rounded-lg bg-emerald-700 px-6 text-base font-black text-white shadow-sm transition active:scale-[0.99]">
        <i class="fa-solid fa-plus mr-2"></i>載入更多
      </button>
    </section>
  </main>

  <div id="lightbox" onclick="closeLightbox()">
    <a id="lightboxDownload" class="download-lightbox-btn" href="#" download title="下載" onclick="event.stopPropagation();">
      <i class="fa-solid fa-download"></i>
    </a>
    <button class="close-lightbox-btn" onclick="closeLightbox()" title="關閉">
      <i class="fa-solid fa-xmark"></i>
    </button>
    <img id="lightboxImg" alt="" onclick="event.stopPropagation();">
    <video id="lightboxVideo" controls playsinline onclick="event.stopPropagation();"></video>
  </div>

  <script>
    const DRIVE_BACKUP_CONFIG = {
      enabled: true,
      gasWebAppUrl: "https://script.google.com/macros/s/AKfycbwhTDrFxWSqw3mLIzSK34xBfU-rb997U2krPxFHcZ_Cs5-hijQ8DTJiJ6If_dqMcSq7/exec",
      maxDriveBytes: 200 * 1024 * 1024
    };

    let filesToUpload = [];
    let currentPage = "upload";
    let albumAssets = [];
    let albumVisibleCount = 0;
    const ALBUM_PAGE_SIZE = 50;

    const els = {
      fileInput: document.getElementById("fileInput"),
      previewGrid: document.getElementById("previewGrid"),
      startUploadBtn: document.getElementById("startUploadBtn"),
      fileCount: document.getElementById("fileCount"),
      uploadStatus: document.getElementById("uploadStatus"),
      albumGrid: document.getElementById("albumGrid"),
      albumCount: document.getElementById("albumCount"),
      loadMoreBtn: document.getElementById("loadMoreBtn"),
      refreshBtn: document.getElementById("refreshBtn"),
      configBadge: document.getElementById("configBadge"),
      lightbox: document.getElementById("lightbox"),
      lightboxDownload: document.getElementById("lightboxDownload"),
      lightboxImg: document.getElementById("lightboxImg"),
      lightboxVideo: document.getElementById("lightboxVideo")
    };

    function updateConfigBadge() {
      if (hasDriveBackupConfig()) {
        els.configBadge.textContent = "Google Drive";
        els.configBadge.className = "rounded-full bg-emerald-100 px-3 py-1 text-xs font-black text-emerald-800";
        return;
      }

      els.configBadge.textContent = "待設定";
      els.configBadge.className = "rounded-full bg-amber-100 px-3 py-1 text-xs font-black text-amber-800";
    }

    function hasDriveBackupConfig() {
      return Boolean(
        DRIVE_BACKUP_CONFIG.enabled &&
        DRIVE_BACKUP_CONFIG.gasWebAppUrl &&
        !DRIVE_BACKUP_CONFIG.gasWebAppUrl.startsWith("請填入")
      );
    }

    function switchPage(page) {
      currentPage = page;
      document.getElementById("page-upload").classList.toggle("hidden", page !== "upload");
      document.getElementById("page-album").classList.toggle("hidden", page !== "album");
      document.getElementById("tab-upload").className = page === "upload"
        ? "active-tab h-12 rounded-md text-base font-black transition"
        : "h-12 rounded-md text-base font-black text-emerald-950/65 transition";
      document.getElementById("tab-album").className = page === "album"
        ? "active-tab h-12 rounded-md text-base font-black transition"
        : "h-12 rounded-md text-base font-black text-emerald-950/65 transition";
      els.refreshBtn.classList.toggle("hidden", page !== "album");
      els.refreshBtn.classList.toggle("grid", page === "album");

      if (page === "album") {
        fetchAlbum();
      }
    }

    function previewFiles() {
      const selectedFiles = Array.from(els.fileInput.files || []);
      let skippedOversizeCount = 0;

      selectedFiles.forEach(file => {
        if (!file.type.startsWith("image/") && !file.type.startsWith("video/")) {
          return;
        }

        if (file.size > DRIVE_BACKUP_CONFIG.maxDriveBytes) {
          skippedOversizeCount += 1;
          return;
        }

        filesToUpload.push({
          id: crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random()}`,
          file,
          previewUrl: URL.createObjectURL(file),
          kind: file.type.startsWith("video/") ? "video" : "image"
        });
      });

      els.fileInput.value = "";
      renderPreview();

      if (skippedOversizeCount > 0) {
        setStatus(`已略過 ${skippedOversizeCount} 個超過 200 MB 的檔案，請用 AirDrop 傳原始檔。`, "warning");
      }
    }

    function renderPreview() {
      els.previewGrid.innerHTML = "";

      filesToUpload.forEach((item, index) => {
        const tile = document.createElement("div");
        tile.className = "media-tile ring-1 ring-slate-200";

        const media = item.kind === "video"
          ? `<video src="${item.previewUrl}" muted playsinline></video><span class="absolute bottom-2 left-2 rounded bg-black/65 px-2 py-1 text-xs font-black text-white"><i class="fa-solid fa-video mr-1"></i>影片</span>`
          : `<img src="${item.previewUrl}" alt="">`;

        tile.innerHTML = `
          ${media}
          <button type="button" class="delete-btn" onclick="removeFile(${index})" title="移除">
            <i class="fa-solid fa-xmark"></i>
          </button>
        `;
        els.previewGrid.appendChild(tile);
      });

      els.fileCount.textContent = filesToUpload.length;
      els.startUploadBtn.classList.toggle("hidden", filesToUpload.length === 0);
      els.uploadStatus.textContent = "";
    }

    function removeFile(index) {
      URL.revokeObjectURL(filesToUpload[index].previewUrl);
      filesToUpload.splice(index, 1);
      renderPreview();
    }

    async function processUpload() {
      if (!hasDriveBackupConfig()) {
        setStatus("請先設定 GAS Google Drive 上傳網址。", "warning");
        return;
      }

      els.startUploadBtn.disabled = true;

      let driveSentCount = 0;
      for (let i = 0; i < filesToUpload.length; i += 1) {
        const item = filesToUpload[i];
        setStatus(`上傳中 ${i + 1} / ${filesToUpload.length}`, "loading");

        if (item.file.size > DRIVE_BACKUP_CONFIG.maxDriveBytes) {
          setStatus(`${item.file.name} 超過 200 MB，請用 AirDrop 傳原始檔。`, "warning");
          await wait(900);
          continue;
        }

        if (hasDriveBackupConfig()) {
          try {
            setStatus(`上傳原始檔到 Google Drive ${i + 1} / ${filesToUpload.length}`, "loading");
            await uploadToGasDrive(item.file);
            driveSentCount += 1;
          } catch (error) {
            console.error(error);
            setStatus(`Google Drive 上傳失敗：${item.file.name}`, "error");
            await wait(900);
          }
        }
      }

      filesToUpload.forEach(item => URL.revokeObjectURL(item.previewUrl));
      filesToUpload = [];
      renderPreview();
      els.startUploadBtn.disabled = false;

      setStatus(`完成：原檔上傳 ${driveSentCount} 個，稍後可在相簿看到縮圖。`, driveSentCount ? "success" : "error");

      if (currentPage === "album") {
        fetchAlbum();
      }
    }

    async function uploadToGasDrive(file) {
      const dataUrl = await readFileAsDataUrl(file);
      const payload = {
        action: "upload",
        fileName: file.name,
        mimeType: file.type || "application/octet-stream",
        size: file.size,
        dataBase64: dataUrl.split(",")[1]
      };

      await fetch(DRIVE_BACKUP_CONFIG.gasWebAppUrl, {
        method: "POST",
        mode: "no-cors",
        headers: {
          "Content-Type": "text/plain;charset=utf-8"
        },
        body: JSON.stringify(payload)
      });
    }

    function readFileAsDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = () => reject(reader.error);
        reader.readAsDataURL(file);
      });
    }

    async function fetchAlbum() {
      if (!hasDriveBackupConfig()) {
        els.albumGrid.innerHTML = emptyState("請先設定 GAS Google Drive 上傳網址。");
        els.albumCount.textContent = "";
        els.loadMoreBtn.classList.add("hidden");
        return;
      }

      els.albumGrid.innerHTML = loadingState();
      els.albumCount.textContent = "";
      els.loadMoreBtn.classList.add("hidden");

      try {
        const assets = await fetchDriveAlbumList();
        renderAlbum(assets, true);
      } catch (error) {
        console.error(error);
        els.albumGrid.innerHTML = emptyState("讀取失敗，請確認 Apps Script 已重新部署。");
        els.loadMoreBtn.classList.add("hidden");
      }
    }

    function fetchDriveAlbumList() {
      return loadGasJsonp({ action: "list" }).then(result => {
        if (!result || result.ok === false) {
          throw new Error(result && result.error ? result.error : "Drive list failed");
        }

        return result.files || [];
      });
    }

    function loadGasJsonp(params) {
      return new Promise((resolve, reject) => {
        const callbackName = `gasCallback_${Date.now()}_${Math.random().toString(36).slice(2)}`;
        const url = new URL(DRIVE_BACKUP_CONFIG.gasWebAppUrl);
        Object.entries(params).forEach(([key, value]) => url.searchParams.set(key, value));
        url.searchParams.set("callback", callbackName);

        const script = document.createElement("script");
        const timeoutId = window.setTimeout(() => {
          cleanup();
          reject(new Error("GAS list request timed out"));
        }, 30000);

        function cleanup() {
          window.clearTimeout(timeoutId);
          delete window[callbackName];
          script.remove();
        }

        window[callbackName] = data => {
          cleanup();
          resolve(data);
        };

        script.onerror = () => {
          cleanup();
          reject(new Error("GAS list request failed"));
        };

        script.src = url.toString();
        document.body.appendChild(script);
      });
    }

    function renderAlbum(assets, reset = false) {
      if (reset) {
        albumAssets = assets;
        albumVisibleCount = 0;
        els.albumGrid.innerHTML = "";
      }

      if (!assets.length) {
        els.albumGrid.innerHTML = emptyState("目前沒有檔案。");
        els.albumCount.textContent = "";
        els.loadMoreBtn.classList.add("hidden");
        return;
      }

      const nextVisibleCount = Math.min(albumVisibleCount + ALBUM_PAGE_SIZE, albumAssets.length);
      const nextAssets = albumAssets.slice(albumVisibleCount, nextVisibleCount);

      nextAssets.forEach(asset => {
        const tile = document.createElement("button");
        tile.type = "button";
        tile.className = "media-tile bg-white text-left shadow-sm ring-1 ring-emerald-900/10 transition active:scale-[0.99]";
        tile.onclick = () => {
          if (asset.kind === "video") {
            window.open(asset.viewUrl, "_blank", "noopener");
            return;
          }

          openLightbox(asset.thumbUrl, asset.kind || "image", asset.viewUrl);
        };

        tile.innerHTML = asset.kind === "video"
          ? `<img src="${asset.thumbUrl}" loading="lazy" alt=""><span class="absolute bottom-2 left-2 rounded bg-black/65 px-2 py-1 text-xs font-black text-white"><i class="fa-solid fa-video mr-1"></i>影片</span>`
          : `<img src="${asset.thumbUrl}" loading="lazy" alt="">`;

        els.albumGrid.appendChild(tile);
      });

      albumVisibleCount = nextVisibleCount;
      els.albumCount.textContent = `已顯示 ${albumVisibleCount} / ${albumAssets.length} 個檔案`;
      els.loadMoreBtn.classList.toggle("hidden", albumVisibleCount >= albumAssets.length);
    }

    function loadMoreAlbum() {
      renderAlbum(albumAssets);
    }

    function openLightbox(url, resourceType, downloadUrl) {
      els.lightboxImg.style.display = resourceType === "image" ? "block" : "none";
      els.lightboxVideo.style.display = resourceType === "video" ? "block" : "none";
      els.lightboxDownload.href = downloadUrl || url;

      if (resourceType === "video") {
        els.lightboxImg.removeAttribute("src");
        els.lightboxVideo.src = url;
        els.lightboxVideo.play().catch(() => {});
      } else {
        els.lightboxVideo.pause();
        els.lightboxVideo.removeAttribute("src");
        els.lightboxImg.src = url;
      }

      els.lightbox.style.display = "flex";
      document.body.style.overflow = "hidden";
    }

    function closeLightbox() {
      els.lightbox.style.display = "none";
      els.lightboxVideo.pause();
      els.lightboxVideo.removeAttribute("src");
      els.lightboxImg.removeAttribute("src");
      document.body.style.overflow = "auto";
    }

    function setStatus(message, type) {
      const styles = {
        loading: "mt-5 min-h-8 text-center text-base font-black text-emerald-700",
        success: "mt-5 min-h-8 text-center text-base font-black text-emerald-700",
        warning: "mt-5 min-h-8 text-center text-base font-black text-amber-700",
        error: "mt-5 min-h-8 text-center text-base font-black text-red-700"
      };

      els.uploadStatus.className = styles[type] || styles.loading;
      els.uploadStatus.textContent = message;
    }

    function loadingState() {
      return `
        <div class="col-span-full rounded-lg bg-white py-24 text-center text-lg font-black text-slate-400 ring-1 ring-emerald-900/10">
          <i class="fa-solid fa-spinner fa-spin mr-2 text-emerald-700"></i>讀取中
        </div>
      `;
    }

    function emptyState(message) {
      return `
        <div class="col-span-full rounded-lg bg-white py-24 text-center text-lg font-black text-slate-400 ring-1 ring-emerald-900/10">
          ${message}
        </div>
      `;
    }

    function wait(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    updateConfigBadge();
  </script>
</body>
</html>
